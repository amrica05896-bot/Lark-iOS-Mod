name: Lark Player Total iOS Immersion (V20 - Clean XML)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build_mod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Python
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner jq curl

      - name: Download Latest Apktool
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | jq -r .tag_name | sed 's/v//')
          wget "https://github.com/iBotPeaches/Apktool/releases/download/v${LATEST_VERSION}/apktool_${LATEST_VERSION}.jar" -O apktool.jar

      - name: Decompile APK
        run: java -jar apktool.jar d -f lark_player.apk -o source_code

      - name: AI Python Smart Patch (Clean XML)
        run: |
          cat << 'PY_EOF' > ai_patcher.py
          import os
          import re

          source_dir = 'source_code'
          manifest_path = os.path.join(source_dir, 'AndroidManifest.xml')

          # 1. تعقيم الـ Manifest
          if os.path.exists(manifest_path):
              with open(manifest_path, 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              with open(manifest_path, 'w', encoding='utf-8') as f:
                  for line in lines:
                      if 'splits0' not in line and 'com.android.vending.splits' not in line:
                          f.write(line)

          res_dir = 'source_code/res'
          drawable_dir = os.path.join(res_dir, 'drawable')
          os.makedirs(drawable_dir, exist_ok=True)

          # 2. ملف الزجاج الحقيقي (بدون أي تعليقات تسبب إيرور)
          with open(os.path.join(drawable_dir, 'ios_real_glass_ui.xml'), 'w') as f:
              f.write('''<?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:top="2dp" android:left="0dp" android:right="0dp" android:bottom="0dp">
                  <shape android:shape="rectangle">
                      <solid android:color="#0D000000" />
                      <corners android:radius="35dp" />
                  </shape>
              </item>
              <item android:bottom="2dp">
                  <shape android:shape="rectangle">
                      <solid android:color="#66FFFFFF" />
                      <corners android:radius="35dp" />
                  </shape>
              </item>
              <item android:bottom="2dp">
                  <shape android:shape="rectangle">
                      <gradient android:angle="135" android:startColor="#80FFFFFF" android:centerColor="#0DFFFFFF" android:endColor="#4DFFFFFF" android:type="linear" />
                      <corners android:radius="35dp" />
                  </shape>
              </item>
              <item android:top="25dp" android:bottom="2dp">
                  <shape android:shape="rectangle">
                      <gradient android:angle="90" android:startColor="#26000000" android:endColor="#00000000" />
                      <corners android:topLeftRadius="0dp" android:topRightRadius="0dp" android:bottomLeftRadius="35dp" android:bottomRightRadius="35dp" />
                  </shape>
              </item>
              <item android:bottom="2dp">
                  <shape android:shape="rectangle">
                      <solid android:color="@android:color/transparent" />
                      <stroke android:width="1.8dp" android:color="#B3FFFFFF" />
                      <corners android:radius="35dp" />
                  </shape>
              </item>
          </layer-list>''')

          # 3. ملف العلامة المائية الزجاجية
          with open(os.path.join(drawable_dir, 'ios_watermark_glass.xml'), 'w') as f:
              f.write('''<?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#73FFFFFF" />
              <stroke android:width="1dp" android:color="#CCFFFFFF" />
              <size android:width="42dp" android:height="42dp" />
          </shape>''')

          # 4. الحقن في الواجهات
          for root, dirs, files in os.walk(res_dir):
              if 'layout' in root:
                  for file in files:
                      if file.endswith('.xml'):
                          path = os.path.join(root, file)
                          with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                              data = f.read()
                          
                          # حقن الزجاج في القوائم
                          keywords_bg = ['player', 'bottom', 'nav', 'tab', 'toolbar', 'dialog', 'panel', 'surface', 'bar', 'side']
                          if any(k in file for k in keywords_bg):
                              data = re.sub(r'android:background="[^"]*"', '', data)
                              data = data.replace('xmlns:android="http://schemas.android.com/apk/res/android"', 
                                               'xmlns:android="http://schemas.android.com/apk/res/android" android:background="@drawable/ios_real_glass_ui"')
                          
                          # حقن العلامة المائية في الفيديو
                          if 'player' in file and 'bottom' not in file and 'nav' not in file:
                              watermark_code = '\n    <ImageView android:layout_width="42dp" android:layout_height="42dp" android:layout_gravity="top|end" android:layout_marginTop="20dp" android:layout_marginEnd="20dp" android:src="@drawable/ios_watermark_glass" android:id="@+id/ios_watermark_mark" android:elevation="5dp" />\n'
                              # حقن بعد أول فريم لاي أوت
                              data = re.sub(r'(<FrameLayout[^>]*>)', r'\1' + watermark_code, data, count=1)

                          with open(path, 'w', encoding='utf-8') as f:
                              f.write(data)
          PY_EOF
          python3 ai_patcher.py

      - name: Rebuild Lark
        run: java -jar apktool.jar b source_code -o unsigned.apk

      - name: Zipalign & Sign
        run: |
          zipalign -v -p 4 unsigned.apk aligned.apk
          keytool -genkey -v -keystore ios.keystore -storepass android -alias android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=LarkDev"
          apksigner sign --ks ios.keystore --ks-pass pass:android --out final_mod.apk aligned.apk

      - name: Upload Final Mod
        uses: actions/upload-artifact@v4
        with:
          name: Lark-iOS-Perfect-Build
          path: final_mod.apk
