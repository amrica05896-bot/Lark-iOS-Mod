name: Lark Player iOS 18 (V24 - Native System Blur)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build_mod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Python
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner jq curl

      - name: Download Apktool (Stable v3.0.1)
        run: |
          wget https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar -O apktool.jar

      - name: Decompile APK
        run: java -jar apktool.jar d -f lark_player.apk -o source_code

      - name: AI Python Smart & Safe Injector
        run: |
          cat << 'PY_EOF' > ai_patcher.py
          import os
          import re

          source_dir = 'source_code'
          manifest_path = os.path.join(source_dir, 'AndroidManifest.xml')

          # 1. تعقيم الـ Manifest
          if os.path.exists(manifest_path):
              with open(manifest_path, 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              with open(manifest_path, 'w', encoding='utf-8') as f:
                  for line in lines:
                      if 'splits0' not in line and 'com.android.vending.splits' not in line:
                          f.write(line)

          res_dir = os.path.join(source_dir, 'res')
          drawable_dir = os.path.join(res_dir, 'drawable')
          os.makedirs(drawable_dir, exist_ok=True)

          # 2. زجاج الآيفون (مبسط ليعمل مع محرك الجافا للبلور)
          with open(os.path.join(drawable_dir, 'ios_18_ultra_glass.xml'), 'w') as f:
              f.write('''<?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#4DFFFFFF" /> <stroke android:width="1dp" android:color="#B3FFFFFF" />
              <corners android:radius="38dp" />
          </shape>''')

          with open(os.path.join(drawable_dir, 'ios_watermark_glass.xml'), 'w') as f:
              f.write('''<?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#66FFFFFF" />
              <stroke android:width="1.5dp" android:color="#E6FFFFFF" />
              <size android:width="45dp" android:height="45dp" />
          </shape>''')

          # 3. دالة الحقن الآمنة (عشان مفيش تاج XML يبوظ)
          def inject_glass(m):
              content = m.group(1)
              closing = m.group(2)
              # إزالة الخلفية القديمة برفق
              content = re.sub(r'android:background="[^"]*"', '', content)
              # استدعاء محرك الجافا (backgroundBlurRadius) الخاص بأندرويد 12+
              return content + ' android:background="@drawable/ios_18_ultra_glass" android:backgroundBlurRadius="30dp" android:elevation="15dp"' + closing

          def inject_scroll(m):
              content = m.group(1)
              closing = m.group(2)
              if 'clipToPadding' not in content:
                  return content + ' android:clipToPadding="false" android:paddingBottom="100dp"' + closing
              return m.group(0)

          for root, dirs, files in os.walk(res_dir):
              if 'layout' in root:
                  for file in files:
                      if file.endswith('.xml'):
                          path = os.path.join(root, file)
                          try:
                              with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                                  data = f.read()

                              # أ: تنظيف الألوان السادة برفق
                              data = re.sub(r'android:background="@[a-zA-Z0-9_/]+color[a-zA-Z0-9_/]*"', 'android:background="@android:color/transparent"', data)
                              
                              # ب: الانزلاق تحت الشريط (الآيفون الحقيقي)
                              data = re.sub(r'(<(?:androidx\.recyclerview\.widget\.RecyclerView|ListView|ScrollView)[^>]*?)(/?>)', inject_scroll, data)

                              # ج: حقن الزجاج والبلور بأمان تام في أول تاج رئيسي
                              keywords_bg = ['player', 'bottom_bar', 'nav', 'tab', 'toolbar', 'dialog', 'panel', 'surface']
                              if any(k in file for k in keywords_bg):
                                  data = re.sub(r'(<(?:LinearLayout|RelativeLayout|FrameLayout|androidx\.constraintlayout\.widget\.ConstraintLayout)[^>]*?)(/?>)', inject_glass, data, count=1)
                              
                              with open(path, 'w', encoding='utf-8') as f:
                                  f.write(data)
                          except Exception as e:
                              print(f"Skipped {file} due to: {e}")
          PY_EOF
          python3 ai_patcher.py

      - name: Rebuild Lark
        run: java -jar apktool.jar b source_code -o unsigned.apk

      - name: Zipalign & Sign
        run: |
          zipalign -v -p 4 unsigned.apk aligned.apk
          keytool -genkey -v -keystore ios.keystore -storepass android -alias android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=LarkDev"
          apksigner sign --ks ios.keystore --ks-pass pass:android --out final_mod.apk aligned.apk

      - name: Upload The Safe Mod
        uses: actions/upload-artifact@v4
        with:
          name: Lark-iOS18-Native-Blur
          path: final_mod.apk
