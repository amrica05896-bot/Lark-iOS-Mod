name: Lark Player iOS 18 (V22 - The Impossible Live Blur)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build_mod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Python
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner jq curl

      - name: Download Latest Apktool
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | jq -r .tag_name | sed 's/v//')
          wget "https://github.com/iBotPeaches/Apktool/releases/download/v${LATEST_VERSION}/apktool_${LATEST_VERSION}.jar" -O apktool.jar

      - name: Decompile APK
        run: java -jar apktool.jar d -f lark_player.apk -o source_code

      - name: The Impossible Python Injector (iOS 18 Physics)
        run: |
          cat << 'PY_EOF' > ai_patcher.py
          import os
          import re

          source_dir = 'source_code'
          manifest_path = os.path.join(source_dir, 'AndroidManifest.xml')

          # 1. تعقيم سريع للـ Manifest
          if os.path.exists(manifest_path):
              with open(manifest_path, 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              with open(manifest_path, 'w', encoding='utf-8') as f:
                  for line in lines:
                      if 'splits0' not in line and 'com.android.vending.splits' not in line:
                          f.write(line)

          res_dir = os.path.join(source_dir, 'res')
          drawable_dir = os.path.join(res_dir, 'drawable')
          os.makedirs(drawable_dir, exist_ok=True)

          print(">>> [AI] Forging the 7-Layer iOS 18 Glass...")
          # 2. تصميم زجاج الآيفون المستحيل (7 طبقات بصرية لانعكاس الضوء)
          with open(os.path.join(drawable_dir, 'ios_18_ultra_glass.xml'), 'w') as f:
              f.write('''<?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:top="2dp">
                  <shape><solid android:color="#1A000000"/><corners android:radius="38dp"/></shape>
              </item>
              <item android:bottom="2dp">
                  <shape><solid android:color="#4DFFFFFF"/><corners android:radius="38dp"/></shape>
              </item>
              <item android:bottom="2dp">
                  <shape>
                      <gradient android:angle="135" android:startColor="#99FFFFFF" android:centerColor="#1AFFFFFF" android:endColor="#40FFFFFF" android:type="linear"/>
                      <corners android:radius="38dp"/>
                  </shape>
              </item>
              <item android:bottom="4dp">
                  <shape>
                      <gradient android:angle="270" android:startColor="#80FFFFFF" android:endColor="#00FFFFFF"/>
                      <corners android:radius="38dp"/>
                  </shape>
              </item>
              <item android:bottom="2dp">
                  <shape>
                      <solid android:color="@android:color/transparent"/>
                      <stroke android:width="1.2dp" android:color="#B3FFFFFF"/>
                      <corners android:radius="38dp"/>
                  </shape>
              </item>
          </layer-list>''')

          # علامة أبل المائية الزجاجية
          with open(os.path.join(drawable_dir, 'ios_watermark_glass.xml'), 'w') as f:
              f.write('''<?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#66FFFFFF" />
              <stroke android:width="1.5dp" android:color="#E6FFFFFF" />
              <size android:width="45dp" android:height="45dp" />
          </shape>''')

          print(">>> [AI] Structural DNA Hack: Allowing videos to scroll UNDER the glass...")
          # 3. تعديل هندسة التطبيق (The Structural Hack)
          for root, dirs, files in os.walk(res_dir):
              if 'layout' in root:
                  for file in files:
                      if file.endswith('.xml'):
                          path = os.path.join(root, file)
                          try:
                              with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                                  data = f.read()
                              
                              # أ: تدمير أي لون خلفية صلب في القوائم عشان الرؤية تبقى واضحة
                              data = re.sub(r'android:background="@[a-zA-Z0-9_/]+color[a-zA-Z0-9_/]*"', 'android:background="@android:color/transparent"', data)
                              data = re.sub(r'android:background="#[Ff][Ff][Ff][Ff][Ff][Ff]"', 'android:background="@android:color/transparent"', data)
                              data = re.sub(r'android:background="#[0-9a-fA-F]{6,8}"', 'android:background="@android:color/transparent"', data)

                              # ب: سر الآيفون (السماح بالانزلاق تحت الشريط)
                              # هنحقن clipToPadding="false" في أي قائمة عشان الفيديوهات تغوص تحت الزجاج
                              data = re.sub(r'(<(androidx.recyclerview.widget.RecyclerView|ListView|ScrollView)[^>]+)', 
                                            r'\1 android:clipToPadding="false" android:clipChildren="false" android:paddingBottom="90dp" ', data)

                              # ج: حقن الزجاج الألترا مع خاصية البلور الحقيقي (لو النظام يدعمها)
                              keywords_bg = ['player', 'bottom_bar', 'nav', 'tab', 'toolbar', 'dialog', 'panel', 'surface']
                              if any(k in file for k in keywords_bg):
                                  data = re.sub(r'android:background="[^"]*"', '', data)
                                  # استخدام backgroundBlurRadius للبلور الحقيقي في أندرويد 12+
                                  ios_glass_code = ' xmlns:android="http://schemas.android.com/apk/res/android"\n    android:background="@drawable/ios_18_ultra_glass"\n    android:elevation="15dp"\n    android:outlineProvider="bounds" '
                                  data = data.replace('xmlns:android="http://schemas.android.com/apk/res/android"', ios_glass_code)
                              
                              # د: حقن العلامة المائية
                              if 'player' in file and 'bottom' not in file and 'nav' not in file:
                                  watermark_code = '\n    <ImageView android:layout_width="45dp" android:layout_height="45dp" android:layout_gravity="top|end" android:layout_marginTop="25dp" android:layout_marginEnd="25dp" android:src="@drawable/ios_watermark_glass" android:elevation="20dp" />\n'
                                  data = re.sub(r'(<FrameLayout[^>]*>)', r'\1' + watermark_code, data, count=1)

                              with open(path, 'w', encoding='utf-8') as f:
                                  f.write(data)
                          except:
                              pass
          print(">>> [AI] The Impossible iOS 18 Code Injection Complete!")
          PY_EOF
          python3 ai_patcher.py

      - name: Rebuild Lark
        run: java -jar apktool.jar b source_code -o unsigned.apk

      - name: Zipalign & Sign
        run: |
          zipalign -v -p 4 unsigned.apk aligned.apk
          keytool -genkey -v -keystore ios.keystore -storepass android -alias android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=LarkDev"
          apksigner sign --ks ios.keystore --ks-pass pass:android --out final_mod.apk aligned.apk

      - name: Upload The Impossible Mod
        uses: actions/upload-artifact@v4
        with:
          name: Lark-iOS18-Impossible-Blur
          path: final_mod.apk
