name: Lark Player iOS AI Patcher (V18 ULTRA)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build_mod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Python
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner jq curl

      - name: Download Latest Apktool
        run: |
          VERSION=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | jq -r .tag_name | sed 's/v//')
          wget https://github.com/iBotPeaches/Apktool/releases/download/v${VERSION}/apktool_${VERSION}.jar -O apktool.jar

      - name: Check APK
        run: |
          if [ ! -f "lark_player.apk" ]; then
            echo "❌ APK NOT FOUND"
            exit 1
          fi

      - name: Decompile APK
        run: java -jar apktool.jar d -f lark_player.apk -o src

      - name: AI Patch Engine V18
        run: |
          cat << 'PY_EOF' > patch.py
          import os,re

          src = "src"
          res = os.path.join(src,"res")
          manifest = os.path.join(src,"AndroidManifest.xml")

          print(">>> Fix Manifest (remove splits)")
          if os.path.exists(manifest):
              data=open(manifest,"r",encoding="utf-8").read()
              data=re.sub(r'.*splits.*','',data)
              data=re.sub(r'.*com.android.vending.splits.*','',data)
              open(manifest,"w",encoding="utf-8").write(data)

          print(">>> Create Glass UI")
          d=os.path.join(res,"drawable")
          os.makedirs(d,exist_ok=True)

          open(os.path.join(d,"ios_glass.xml"),"w").write("""<?xml version="1.0" encoding="utf-8"?>
<layer-list xmlns:android="http://schemas.android.com/apk/res/android">
<item><shape><gradient android:startColor="#66FFFFFF" android:endColor="#22FFFFFF" android:angle="270"/><corners android:radius="30dp"/></shape></item>
<item><shape><stroke android:width="1.2dp" android:color="#99FFFFFF"/><corners android:radius="30dp"/></shape></item>
</layer-list>""")

          print(">>> Inject UI Safely")

          for root,dirs,files in os.walk(res):
              if "layout" in root:
                  for f in files:
                      if f.endswith(".xml"):
                          p=os.path.join(root,f)
                          try:
                              txt=open(p,"r",encoding="utf-8",errors="ignore").read()

                              if any(k in f for k in ["player","nav","bottom","toolbar","tab"]):

                                  txt=re.sub(r'android:background="[^"]*"',"",txt)

                                  if "@drawable/ios_glass" not in txt:
                                      txt=txt.replace(
                                          'xmlns:android="http://schemas.android.com/apk/res/android"',
                                          'xmlns:android="http://schemas.android.com/apk/res/android" android:background="@drawable/ios_glass" android:alpha="0.95" android:elevation="12dp"'
                                      )

                                  open(p,"w",encoding="utf-8").write(txt)
                          except:
                              pass

          print(">>> DONE")
          PY_EOF

          python3 patch.py

      - name: Build APK
        run: java -jar apktool.jar b src -o unsigned.apk

      - name: Align APK
        run: zipalign -p 4 unsigned.apk aligned.apk

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore key.keystore -storepass android -alias key -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android,O=Android,C=US"
          apksigner sign --ks key.keystore --ks-pass pass:android --out final.apk aligned.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Lark-iOS-V18
          path: final.apk
