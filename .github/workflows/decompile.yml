name: Lark Player iOS AI Patcher (V14 - Smart Linker)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build_mod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Python
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner jq curl

      - name: Download LATEST Apktool
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | jq -r .tag_name | sed 's/v//')
          wget "https://github.com/iBotPeaches/Apktool/releases/download/v${LATEST_VERSION}/apktool_${LATEST_VERSION}.jar" -O apktool.jar

      - name: Decompile Lark Player
        run: java -jar apktool.jar d -f lark_player.apk -o source_code

      - name: AI Python Smart Linker & UI Injection
        run: |
          cat << 'PY_EOF' > ai_patcher.py
          import os
          import re

          source_dir = 'source_code'
          res_dir = os.path.join(source_dir, 'res')
          mapping = {}

          print(">>> [AI] Step 1: Renaming & Building Map...")
          # البحث عن الملفات المزعجة وتخزين الاسم القديم والجديد
          for root, dirs, files in os.walk(res_dir):
              for file in files:
                  if '$' in file:
                      old_path = os.path.join(root, file)
                      new_name = file.replace('$', '_')
                      new_path = os.path.join(root, new_name)
                      
                      # تخزين الاسم بدون امتداد للاستبدال في الـ XML
                      old_base = os.path.splitext(file)[0]
                      new_base = os.path.splitext(new_name)[0]
                      mapping[old_base] = new_base
                      
                      if not os.path.exists(new_path):
                          os.rename(old_path, new_path)

          print(">>> [AI] Step 2: Updating References in XML & Smali...")
          # البحث والاستبدال في كل ملفات المشروع
          for root, dirs, files in os.walk(source_dir):
              for file in files:
                  if file.endswith(('.xml', '.smali')):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                              content = f.read()
                          
                          changed = False
                          for old, new in mapping.items():
                              if old in content:
                                  content = content.replace(f'@{os.path.basename(root)}/{old}', f'@{os.path.basename(root)}/{new}')
                                  content = content.replace(f'drawable/{old}', f'drawable/{new}')
                                  content = content.replace(f'layout/{old}', f'layout/{new}')
                                  changed = True
                          
                          if changed:
                              with open(path, 'w', encoding='utf-8') as f:
                                  f.write(content)
                      except:
                          pass

          print(">>> [AI] Step 3: Forging iOS Glass UI...")
          drawable_dir = os.path.join(res_dir, 'drawable')
          os.makedirs(drawable_dir, exist_ok=True)
          with open(os.path.join(drawable_dir, 'ios_glass_ui.xml'), 'w') as f:
              f.write('''<?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item><shape><solid android:color="#66FFFFFF"/><corners android:radius="35dp"/></shape></item>
              <item android:top="1dp" android:left="1dp" android:right="1dp" android:bottom="1dp">
                  <shape><stroke android:width="1.5dp" android:color="#CCFFFFFF"/><corners android:radius="35dp"/></shape>
              </item>
          </layer-list>''')

          print(">>> [AI] Step 4: UI Background Injection...")
          for root, dirs, files in os.walk(res_dir):
              if 'layout' in root:
                  for file in files:
                      if any(k in file for k in ['player', 'bottom', 'nav', 'tab', 'toolbar', 'panel']):
                          path = os.path.join(root, file)
                          with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                              data = f.read()
                          data = re.sub(r'android:background="[^"]*"', '', data)
                          data = data.replace('xmlns:android="http://schemas.android.com/apk/res/android"', 
                                           'xmlns:android="http://schemas.android.com/apk/res/android" android:background="@drawable/ios_glass_ui"')
                          with open(path, 'w', encoding='utf-8') as f:
                              f.write(data)
          PY_EOF
          python3 ai_patcher.py

      - name: Rebuild Lark
        run: java -jar apktool.jar b source_code -o unsigned.apk

      - name: Sign & Align Final Build
        run: |
          zipalign -v -p 4 unsigned.apk aligned.apk
          keytool -genkey -v -keystore ios.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=LarkDev"
          apksigner sign --ks ios.keystore --ks-pass pass:android aligned.apk

      - name: Upload iOS Edition
        uses: actions/upload-artifact@v4
        with:
          name: Lark-iOS-Glass-Final
          path: aligned.apk
