name: Lark Player iOS AI Patcher (V17 - Manifest Fix)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build_mod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Python
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pro Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner jq curl

      - name: Download Latest Apktool
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | jq -r .tag_name | sed 's/v//')
          wget "https://github.com/iBotPeaches/Apktool/releases/download/v${LATEST_VERSION}/apktool_${LATEST_VERSION}.jar" -O apktool.jar

      - name: Decompile APK
        run: java -jar apktool.jar d -f lark_player.apk -o source_code

      - name: AI Python Smart Patch & Manifest Sterilization
        run: |
          cat << 'PY_EOF' > ai_patcher.py
          import os
          import re

          source_dir = 'source_code'
          manifest_path = os.path.join(source_dir, 'AndroidManifest.xml')

          # 1. تعقيم الـ Manifest (حذف لعنة الـ Splits)
          if os.path.exists(manifest_path):
              print(">>> [AI] Sterilizing AndroidManifest.xml...")
              with open(manifest_path, 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              
              with open(manifest_path, 'w', encoding='utf-8') as f:
                  for line in lines:
                      # حذف أي سطر فيه إشارة للـ splits0 أو مراجع التقسيم
                      if 'splits0' not in line and 'com.android.vending.splits' not in line:
                          f.write(line)

          # 2. حقن الزجاج (iOS Glass)
          res_dir = os.path.join(source_dir, 'res')
          drawable_dir = os.path.join(res_dir, 'drawable')
          os.makedirs(drawable_dir, exist_ok=True)
          with open(os.path.join(drawable_dir, 'ios_glass_ui.xml'), 'w') as f:
              f.write('<?xml version="1.0" encoding="utf-8"?><layer-list xmlns:android="http://schemas.android.com/apk/res/android"><item><shape><solid android:color="#66FFFFFF"/><corners android:radius="35dp"/></shape></item><item android:top="1dp" android:left="1dp" android:right="1dp" android:bottom="1dp"><shape><stroke android:width="1.5dp" android:color="#CCFFFFFF"/><corners android:radius="35dp"/></shape></item></layer-list>')

          # 3. استبدال الخلفيات في الـ Layouts
          for root, dirs, files in os.walk(res_dir):
              if 'layout' in root:
                  for file in files:
                      if any(k in file for k in ['player', 'bottom', 'nav', 'tab', 'toolbar']):
                          path = os.path.join(root, file)
                          with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                              data = f.read()
                          data = re.sub(r'android:background="[^"]*"', '', data)
                          data = data.replace('xmlns:android="http://schemas.android.com/apk/res/android"', 
                                           'xmlns:android="http://schemas.android.com/apk/res/android" android:background="@drawable/ios_glass_ui"')
                          with open(path, 'w', encoding='utf-8') as f:
                              f.write(data)
          print(">>> [AI] Manifest Sterilized and UI Injected!")
          PY_EOF
          python3 ai_patcher.py

      - name: Rebuild APK (The Final Push)
        run: java -jar apktool.jar b source_code -o unsigned.apk

      - name: Zipalign & Sign
        run: |
          zipalign -v -p 4 unsigned.apk aligned.apk
          keytool -genkey -v -keystore ios.keystore -storepass android -alias android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=LarkDev"
          apksigner sign --ks ios.keystore --ks-pass pass:android --out final_mod.apk aligned.apk

      - name: Upload Final Mod
        uses: actions/upload-artifact@v4
        with:
          name: Lark-iOS-Perfect-Build
          path: final_mod.apk
